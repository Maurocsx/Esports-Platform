server:
  port: 8084

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-api
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/esports/**

        - id: core-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/**